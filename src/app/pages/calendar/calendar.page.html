<ion-header [translucent]="true" class="ion-no-border cal-header">
  <ion-toolbar>
    <ion-title class="cal-title">Calendar</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="cal-content">
  <div class="cal-wrapper">

    <!-- Month Navigator -->
    <div class="month-nav">
      <button class="nav-arrow" (click)="prevMonth()" type="button" aria-label="Previous month">&#8249;</button>
      <span class="month-label">{{ currentMonthLabel }}</span>
      <button class="nav-arrow" (click)="nextMonth()" type="button" aria-label="Next month">&#8250;</button>
    </div>

    <!-- Day Strip -->
    <div class="day-strip">
      <button
        *ngFor="let day of weekDays"
        class="day-pill"
        [class.day-pill--today]="isToday(day.date)"
        [class.day-pill--selected]="isSelectedDay(day.date)"
        [class.day-pill--has-tasks]="hasTasksOnDay(day.date)"
        (click)="selectDay(day.date)"
        type="button"
        [attr.aria-label]="day.label + ' ' + day.num"
      >
        <span class="day-letter">{{ day.label }}</span>
        <span class="day-num">{{ day.num }}</span>
        <span class="day-dot" *ngIf="hasTasksOnDay(day.date)"></span>
      </button>
    </div>

    <!-- Date Heading + Add Button -->
    <div class="section-head">
      <h3 class="section-date">{{ selectedDateLabel }}</h3>
      <button class="add-btn" (click)="openAddTask()" type="button">+ Add Task</button>
    </div>

    <!-- Trigger Reminder -->
    <div class="reminder-card" *ngIf="userTriggers.length > 0">
      <span class="reminder-dot"></span>
      <span class="reminder-text">Watch out for: <strong>{{ userTriggers.join(', ') }}</strong></span>
    </div>

    <!-- Task List -->
    <div class="task-list" *ngIf="tasksForSelectedDay.length > 0">
      <div
        *ngFor="let task of tasksForSelectedDay; trackBy: trackById"
        class="task-card"
        [class.task-card--done]="task.done"
      >
        <button
          class="task-check"
          (click)="toggleTaskDone(task)"
          type="button"
          [attr.aria-label]="(task.done ? 'Unmark' : 'Mark done') + ': ' + task.title"
        >
          <span class="check-circle">
            <span class="check-mark" *ngIf="task.done">&#10003;</span>
          </span>
        </button>

        <div class="task-body">
          <p class="task-title">{{ task.title }}</p>
          <p class="task-meta" *ngIf="task.time || task.category">
            <span *ngIf="task.time">{{ task.time }}</span>
            <span class="meta-sep" *ngIf="task.time && task.category"> &middot; </span>
            <span *ngIf="task.category">{{ categoryLabel(task.category) }}</span>
          </p>
          <p class="task-note" *ngIf="task.note">{{ task.note }}</p>
        </div>

        <button class="task-del" (click)="deleteTask(task)" type="button" aria-label="Delete task">&#10005;</button>
      </div>
    </div>

    <!-- Empty State -->
    <div class="empty-state" *ngIf="tasksForSelectedDay.length === 0">
      <div class="empty-icon-wrap">
        <ion-icon name="calendar-outline" class="empty-icon"></ion-icon>
      </div>
      <p class="empty-title">No tasks for this day</p>
      <p class="empty-sub">Tap <strong>+ Add Task</strong> to get started</p>
    </div>

  </div>
</ion-content>

<!-- Add Task Bottom Sheet -->
<div class="sheet-overlay" *ngIf="showAddModal" (click)="closeModal()">
  <div class="sheet-card" (click)="$event.stopPropagation()">
    <div class="sheet-handle"></div>
    <h3 class="sheet-title">New Task</h3>

    <div class="field-block">
      <label class="field-label">Task Title</label>
      <div class="native-input-wrap">
        <input
          type="text"
          placeholder="e.g. Take medication"
          [(ngModel)]="newTask.title"
          class="native-input"
        />
      </div>
    </div>

    <div class="field-block">
      <label class="field-label">Time (optional)</label>
      <div class="native-input-wrap">
        <input
          type="time"
          [(ngModel)]="newTask.time"
          class="native-input"
        />
      </div>
    </div>

    <div class="field-block">
      <label class="field-label">Note (optional)</label>
      <div class="native-input-wrap">
        <input
          type="text"
          placeholder="e.g. With food"
          [(ngModel)]="newTask.note"
          class="native-input"
        />
      </div>
    </div>

    <div class="field-block">
      <label class="field-label">Category</label>
      <div class="chip-row">
        <button
          *ngFor="let cat of taskCategories"
          class="chip"
          [class.chip--on]="newTask.category === cat.value"
          (click)="newTask.category = cat.value"
          type="button"
        >{{ cat.label }}</button>
      </div>
    </div>

    <p class="sheet-error" *ngIf="modalError">{{ modalError }}</p>

    <div class="sheet-actions">
      <button class="btn btn--cancel" (click)="closeModal()" type="button">Cancel</button>
      <button class="btn btn--confirm" (click)="saveTask()" type="button">Add Task</button>
    </div>
  </div>
</div>

<!-- Tab Bar -->
<ion-tab-bar slot="bottom" class="ms-tab-bar">
  <ion-tab-button tab="home" href="/home">
    <ion-icon name="home-outline"></ion-icon>
    <ion-label>Home</ion-label>
  </ion-tab-button>
  <ion-tab-button tab="calendar" href="/calendar">
    <ion-icon name="calendar-outline"></ion-icon>
    <ion-label>Calendar</ion-label>
  </ion-tab-button>
  <ion-tab-button tab="add-task" href="/add-task">
    <ion-icon name="add-circle-outline"></ion-icon>
    <ion-label>Add</ion-label>
  </ion-tab-button>
</ion-tab-bar>
