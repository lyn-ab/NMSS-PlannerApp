<ion-header class="ion-no-border">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-back-button defaultHref="/" text="" icon="chevron-back"></ion-back-button>
    </ion-buttons>
    <ion-title>Create New Task</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="ion-padding">
  <div class="form-wrapper">
    <div class="input-group">
      <ion-label class="main-label">WHAT TASK NEEDS TO BE DONE?</ion-label>
      <div class="voice-input-wrapper">
        <ion-input [(ngModel)]="newTask.title" placeholder="e.g., Buy groceries" class="custom-input"></ion-input>
        <ion-button fill="clear" class="btn-voice" (click)="startVoiceRecognition()">
          <ion-icon name="mic-outline"></ion-icon>
        </ion-button>
      </div>
    </div>

   <div class="input-group">
  <ion-label class="main-label">CATEGORY</ion-label>

  <div class="category-grid">
    <div *ngFor="let cat of categories"
         class="category-chip"
         [class.active]="newTask.type === cat.name"
         (click)="selectCategory(cat)">
      <ion-icon [name]="cat.icon"></ion-icon>
      <span>{{ cat.name }}</span>
    </div>
  </div>

  <div class="custom-category-container">
    <div class="category-chip custom-button"
         [class.active]="isCustomCategorySelected()"
         [class.shrunk]="isCustomCategorySelected()"
         (click)="toggleCustomEdit()">
      <ion-icon [name]="newTask.icon || 'add-circle-outline'"></ion-icon>
      <span>{{ isCustomCategorySelected() ? newTask.type : 'Other' }}</span>
    </div>

    <div class="custom-edit-area" *ngIf="isEditingCustom">
      <ion-item lines="none" class="custom-input-item">
        <ion-input placeholder="Category Name" [(ngModel)]="newTask.type"></ion-input>
      </ion-item>

      <ion-item lines="none" class="custom-input-item">
        <ion-select placeholder="Pick an Icon" [(ngModel)]="newTask.icon" interface="popover">
          <div slot="label">Select Icon</div>
          <ion-select-option *ngFor="let icon of allIcons" [value]="icon.value">
            {{ icon.name }}
          </ion-select-option>
        </ion-select>
      </ion-item>

      <ion-button fill="clear" (click)="isEditingCustom = false">Done</ion-button>
    </div>
  </div>
</div>

    <div class="details-card">
      <div class="detail-row">
        <ion-icon name="calendar-outline"></ion-icon>
        <ion-datetime-button datetime="datetime"></ion-datetime-button>
        <ion-modal [keepContentsMounted]="true">
          <ng-template>
            <ion-datetime id="datetime" presentation="date-time" [(ngModel)]="newTask.duedate" [min]="minDate"></ion-datetime>
          </ng-template>
        </ion-modal>
      </div>

      <div class="detail-row">
        <ion-icon name="location-outline"></ion-icon>
        <ion-input [(ngModel)]="newTask.locationName" placeholder="Location link..."></ion-input>
      </div>

      <div class="detail-row">
        <ion-icon name="document-text-outline"></ion-icon>
        <ion-textarea [(ngModel)]="newTask.userNotes" placeholder="Notes or links..." [autoGrow]="true"></ion-textarea>
      </div>
    </div>

    <ion-button expand="block" class="btn-save" (click)="saveTask()">Save Task</ion-button>
  </div>
</ion-content>

<ion-modal #modal trigger="open-icon-modal">
  <ng-template>
    <ion-header>
      <ion-toolbar>
        <ion-title>Pick an Icon</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="modal.dismiss()">Cancel</ion-button>
        </ion-buttons>
      </ion-toolbar>
      <ion-toolbar>
        <ion-searchbar (ionInput)="filterIcons($event)" placeholder="Search icons..."></ion-searchbar>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <div class="icon-picker-grid">
        <div *ngFor="let icon of filteredIcons" (click)="selectCustomIcon(icon, modal)" class="icon-option">
          <ion-icon [name]="icon.value"></ion-icon>
        </div>
      </div>
    </ion-content>
  </ng-template>
</ion-modal>
