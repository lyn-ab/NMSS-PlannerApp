<ion-content [fullscreen]="true" class="ion-padding">
  <div class="greeting-section">
    <h1>How are you feeling today?</h1>
    <div class="action-buttons" style="display: flex; align-items: center; gap: 10px;">
      <ion-button (click)="openSymptomLogger()" shape="round" style="flex: 1;">
        Log Symptoms
      </ion-button>
      <ion-fab-button size="small" color="secondary">
        <ion-icon name="mic"></ion-icon>
      </ion-fab-button>
    </div>
  </div>

  <div class="task-section">
    <h3>Your Tasks</h3>
    <div class="task-slider">
      @for (task of tasks; track task.title) {
        <ion-card class="task-card">
          <div class="card-inner">
            <div class="header-row">
              <div class="type-badge">
                <ion-icon [name]="task.icon"></ion-icon>
                <span>{{ task.type }}</span>
              </div>
              <ion-icon name="ellipsis-horizontal" class="dots-icon"></ion-icon>
            </div>

            <h2 class="task-title">{{ task.title }}</h2>

            <div class="tag-row">
              <span class="upcoming-tag">#upcoming</span>
            </div>

            <div class="button-action-row">
              <button class="btn-micro" (click)="generateSteps(task)">
                <ion-icon name="sparkles-outline"></ion-icon>
                Generate microsteps
              </button>
            </div>

            <div class="footer-row">
              <div class="location-info">
                <ion-icon name="location-sharp"></ion-icon>
                <span>{{ task.locationName }}</span>
              </div>

              <button class="btn-skip" (click)="skipTask(task)">Skip</button>
            </div>
          </div>
        </ion-card>
      } @empty {
        <p class="ion-padding ion-text-center">No tasks for today. Rest up!</p>
      }
    </div>
  </div>

  <div class="milestone-section">
    <h4>Daily Progress</h4>
    <ion-progress-bar [value]="progressValue"></ion-progress-bar>
    <p class="affirmation-text">{{ affirmation }}</p>
  </div>
</ion-content>
