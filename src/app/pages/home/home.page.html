<ion-header [translucent]="true" class="ion-no-border">
  <ion-toolbar>
    <ion-title class="home-title">Good Morning!</ion-title>
    <ion-buttons slot="end">
      <ion-button (click)="logout()" aria-label="Sign out">
        <ion-icon name="person-circle-outline" class="profile-icon"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true" class="home-content">
  <div class="home-wrapper">

    <!-- Greeting -->
    <div class="greeting-section">
      <h1 class="greeting-heading">How are you feeling today?</h1>
      <div class="action-buttons">
        <button class="log-btn" (click)="openSymptomLogger()">
          <ion-icon name="pulse-outline"></ion-icon>
          Log Symptoms
        </button>
        <button class="mic-btn" (click)="playGreeting()">
          <ion-icon name="mic-outline"></ion-icon>
        </button>
      </div>
    </div>

    <!-- Tasks -->
    <div class="task-section">
      <h3 class="section-title">Your Tasks</h3>
      <div class="task-slider">
        @for (task of tasks; track task.title) {
          <div class="task-card">
            <div class="card-inner">
              <div class="header-row">
                <div class="type-badge">
                  <ion-icon [name]="task.icon"></ion-icon>
                  <span>{{ task.type }}</span>
                </div>
                <ion-icon name="ellipsis-horizontal" class="dots-icon"></ion-icon>
              </div>
              <h2 class="task-title">{{ task.title }}</h2>
              <div class="tag-row">
                <span class="upcoming-tag">#upcoming</span>
              </div>
              <div class="button-action-row">
                <button class="btn-micro" (click)="generateSteps(task)">
                  <ion-icon name="sparkles-outline"></ion-icon>
                  Generate microsteps
                </button>
              </div>
              <div class="footer-row">
                <div class="location-info">
                  <ion-icon name="location-sharp"></ion-icon>
                  <span>{{ task.locationName }}</span>
                </div>
                <button class="btn-skip" (click)="skipTask(task)">Skip</button>
              </div>
            </div>
          </div>
        } @empty {
          <p class="empty-tasks">No tasks for today. Rest up!</p>
        }
      </div>
    </div>

    <!-- Progress -->
    <div class="milestone-section">
      <h4 class="progress-title">Daily Progress</h4>
      <div class="progress-track">
        <div class="progress-fill" [style.width.%]="progressValue * 100"></div>
      </div>
      <p class="affirmation-text">{{ affirmation }}</p>
    </div>

  </div>
</ion-content>

<!-- ✅ FIXED: plain div nav bar using router.navigate — works with any routing setup -->
<div class="bottom-nav">
  <button class="nav-btn" (click)="goTo('/home')" [class.nav-btn--active]="true">
    <ion-icon name="home-outline"></ion-icon>
    <span>Home</span>
  </button>
  <button class="nav-btn" (click)="goTo('/calendar')">
    <ion-icon name="calendar-outline"></ion-icon>
    <span>Calendar</span>
  </button>
  <button class="nav-btn" (click)="goTo('/add-task')">
    <ion-icon name="add-circle-outline"></ion-icon>
    <span>Add Task</span>
  </button>
</div>
